<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="icon" type="image/png" href="/imresizer-meme.png">
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Neo Arcade v2</title>
 <link rel="stylesheet" href="style.css">


<h1>Neo Arcade v2</h1>

<div id="authPanel" class="panel">

<h2>Register</h2>

<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="userPanel" class="panel" style="display:none;">

    <div id="announcementPanel"
     class="panel">

    <h2>Announcements</h2>

    <div id="announcementList">
        Loading...
    </div>

</div>
    
<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div id="adminBadge" style="display:none;">
    <h3>Administrator</h3>
</div>
    <div id="adminPanel" style="display:none; margin-top:20px;">

    <h2>Admin Panel</h2>

    <table
        id="userTable"
        style="
            width:100%;
            border-collapse:collapse;
        ">
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Banned</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="userTableBody">
        </tbody>

    </table>

</div>

<div class="game-grid">

<div class="game">
<a href="https://reheheheheehe.github.io/cuphead-rehe/" target="_blank">
<img src="cuphead-cover.png">
<h3>Cuphead</h3>
</a>
</div>

<div class="game">
<a href="https://reheheheheehe.github.io/Celeste/" target="_blank">
<img src="celeste cover art.jpeg">
<h3>Celeste</h3>
</a>
</div>

<div class="game">
<a href="https://ustymukhman.github.io/WebDOOM/public/" target="_blank">
<img src="doom-cover.jpg">
<h3>DOOM</h3>
</a>
</div>

<div class="game">
<a href="https://reheheheheehe.github.io/Deltarune/" target="_blank">
<img src="deltarune-cover.jpg">
<h3>Deltarune</h3>
</a>
</div>

<div class="game">
<h3>Minecraft</h3>
</div>

<div class="game">
<h3>Terraria</h3>
</div>

<div class="game">
<h3>Hollow Knight</h3>
</div>

<div class="game">
<a href="https://kosmikau.github.io/" target="_blank">
<h3>Kosmik's Site</h3>
</a>
</div>

</div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
    "https://xendlckjbpqllbfzmouj.supabase.co",
    "sb_publishable_Twcn4S7CVpv-WHCz063wcg_wvQPyKkB"
);

window.register = async () => {

    const username =
        document.getElementById("regUsername").value.trim();

    const email =
        document.getElementById("regEmail").value.trim();

    const password =
        document.getElementById("regPassword").value;

    if(!username || !email || !password){
        alert("Please fill in all fields.");
        return;
    }

    const { data, error } =
        await supabase.auth.signUp({
            email,
            password
        });

    if(error){
        alert(error.message);
        return;
    }

    const userId = data.user.id;

    const { error: profileError } =
        await supabase
            .from("profiles")
            .insert({
                id:userId,
                username:username,
                email:email,
                role:"player",
                is_banned:false
            });

    if(profileError){
        alert(profileError.message);
        return;
    }

    alert("Account created successfully.");
};

window.login = async () => {

    const username =
        document.getElementById("loginUsername").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    const { data, error } =
        await supabase.rpc(
            "get_email_from_username",
            {
                input_username: username
            }
        );

    if(error){
        console.error(error);
        alert("Username lookup failed.");
        return;
    }

    if(!data || data.length === 0){
        alert("Username not found.");
        return;
    }

    const email = data[0].email;

    const { error: loginError } =
        await supabase.auth.signInWithPassword({
            email,
            password
        });

    if(loginError){
        alert(loginError.message);
        return;
    }

    await loadUser();
};

window.logout = async () => {

    await supabase.auth.signOut();

    location.reload();
};
    async function loadAdminPanel(){

    const { data, error } =
        await supabase.rpc(
            "get_all_profiles"
        );

    if(error){
        console.error(error);
        return;
    }

    const tableBody =
        document.getElementById(
            "userTableBody"
        );

    tableBody.innerHTML = "";

    data.forEach(user => {

        const row =
            document.createElement("tr");

        row.innerHTML = `
            <td>${user.username}</td>
            <td>${user.role}</td>
            <td>${user.is_banned ? "Yes" : "No"}</td>

            <td>

                <button
                    onclick="changeRole(
                        '${user.id}',
                        '${
                            user.role === 'admin'
                            ? 'player'
                            : 'admin'
                        }',
                        ${user.is_banned}
                    )">

                    ${
                        user.role === 'admin'
                        ? 'Demote'
                        : 'Promote'
                    }

                </button>

                <button
                    onclick="toggleBan(
                        '${user.id}',
                        '${user.role}',
                        ${!user.is_banned}
                    )">

                    ${
                        user.is_banned
                        ? 'Unban'
                        : 'Ban'
                    }

                </button>

            </td>
        `;

        tableBody.appendChild(row);

    });

}
    window.changeRole = async (
    userId,
    newRole,
    currentBanStatus
) => {

    const { error } =
        await supabase.rpc(
            "admin_update_user",
            {
                target_user_id: userId,
                new_role: newRole,
                new_ban_status:
                    currentBanStatus
            }
        );

    if(error){
        alert(error.message);
        return;
    }

    await loadAdminPanel();
};
    window.toggleBan = async (
    userId,
    currentRole,
    newBanStatus
) => {

    const { error } =
        await supabase.rpc(
            "admin_update_user",
            {
                target_user_id: userId,
                new_role: currentRole,
                new_ban_status:
                    newBanStatus
            }
        );

    if(error){
        alert(error.message);
        return;
    }

    await loadAdminPanel();
};

    async function loadAnnouncements(){

    const { data, error } =
        await supabase.rpc(
            "get_announcements"
        );

    if(error){
        console.error(error);
        return;
    }

    const container =
        document.getElementById(
            "announcementList"
        );

    container.innerHTML = "";

    data.forEach(item => {

        container.innerHTML += `
    <div class="announcement">

        <h3>${item.title}</h3>

        <p>${item.message}</p>

        <small>
            ${new Date(
                item.created_at
            ).toLocaleString()}
        </small>

    </div>
`;
                
    });

}
 window.createAnnouncement = async () => {

    const title =
        document.getElementById(
            "announcementTitle"
        ).value.trim();

    const message =
        document.getElementById(
            "announcementMessage"
        ).value.trim();

    if(!title || !message){

        alert(
            "Please fill in all fields."
        );

        return;
    }

    const { error } =
        await supabase.rpc(
            "create_announcement",
            {
                announcement_title:title,
                announcement_message:message
            }
        );

    if(error){

        alert(error.message);

        console.error(error);

        return;
    }

    document.getElementById(
        "announcementTitle"
    ).value = "";

    document.getElementById(
        "announcementMessage"
    ).value = "";

    await loadAnnouncements();

    alert(
        "Announcement posted."
    );

};

async function loadUser(){

 

    
    const { data } =
        await supabase.auth.getUser();

    const user = data.user;

    if(!user) return;

    const { data: profile, error } =
        await supabase
            .from("profiles")
            .select("*")
            .eq("id", user.id)
            .single();

    if(error || !profile){
        console.error(error);
        return;
    }

    if(profile.is_banned){

        alert("This account has been banned.");

        await supabase.auth.signOut();

        location.reload();

        return;
    }

    document.getElementById("welcome").innerHTML =
        `Welcome ${profile.username}<br>Role: ${profile.role}`;

    await loadAnnouncements();

    document.getElementById("authPanel").style.display = "none";
    document.getElementById("userPanel").style.display = "block";

    if(profile.role === "admin"){

    document.getElementById(
        "adminBadge"
    ).style.display = "block";

    document.getElementById(
        "adminPanel"
    ).style.display = "block";

    await loadAdminPanel();
}
}

const {
    data:{session}
} = await supabase.auth.getSession();

if(session){
    await loadUser();
}
</script>

</body>
</html>
