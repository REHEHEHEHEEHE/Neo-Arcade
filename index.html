<!DOCTYPE html>
<html lang="en">
<head>

 <title>Neo Arcade v2</title>
 <link rel="stylesheet" href="style.css">


<h1>Neo Arcade v2</h1>

<div id="authPanel" class="panel">

<h2>Register</h2>

<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="userPanel" class="panel" style="display:none;">

    <div id="announcementPanel"
     class="panel">

    <h2>Announcements</h2>

    <div id="announcementList">
        Loading...
    </div>

</div>
    
<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div id="adminBadge" style="display:none;">
    <h3>Administrator</h3>
</div>
    <div id="adminPanel" style="display:none; margin-top:20px;">

    <h2>Admin Panel</h2>

    <table
        id="userTable"
        style="
            width:100%;
            border-collapse:collapse;
        ">
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Banned</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="userTableBody">
        </tbody>

    </table>

</div>
